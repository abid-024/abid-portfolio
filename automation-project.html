<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Details | Abid Hasan</title>

  <style>
    :root {
      --bg: #eee6d7;
      --paper: #f3f0ec;
      --text: #17120f;
      --muted: #6f6760;
      --line: #17120f;

      --purple: #4c3376;
      --wine: #552640;
      --cream: #fff8e9;
      --lavender: #b89aff;

      --shadow: 0 22px 60px rgba(24, 15, 40, 0.14);
    }

    body.dark {
      --bg: #0f0b19;
      --paper: #181222;
      --text: #fff8e9;
      --muted: rgba(255, 248, 233, 0.68);
      --line: #fff8e9;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(23, 18, 15, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 18, 15, 0.05) 1px, transparent 1px),
        var(--bg);
      background-size: 44px 44px;
      color: var(--text);
      transition: 0.3s ease;
    }

    body.dark {
      background:
        radial-gradient(circle at top, rgba(76, 51, 118, 0.32), transparent 35%),
        linear-gradient(rgba(255, 248, 233, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 248, 233, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 44px 44px, 44px 44px, auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      width: 100%;
      display: block;
    }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    /* NAV */

    .nav-wrap {
      padding: 24px 0 36px;
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
    }

    .nav {
      min-height: 64px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: rgba(248, 241, 228, 0.82);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      box-shadow: 0 18px 45px rgba(23, 18, 15, 0.08);
    }

    body.dark .nav {
      background: rgba(24, 18, 34, 0.84);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-space {
      width: 42px;
      height: 42px;
      border: 2px solid rgba(23, 18, 15, 0.24);
      border-radius: 14px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: rgba(255, 248, 233, 0.5);
      font-weight: 950;
      box-shadow: 0 10px 24px rgba(15, 18, 20, 0.12);
      animation: logoFloat 4.8s ease-in-out infinite;
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    body.dark .logo-space {
      border-color: rgba(255, 248, 233, 0.26);
      background: rgba(255, 248, 233, 0.06);
    }

    .logo-space img {
      height: 100%;
      object-fit: contain;
      padding: 6px;
    }

    .brand:hover .logo-space {
      transform: translateY(-2px) rotate(-4deg);
      box-shadow: 0 14px 28px rgba(15, 18, 20, 0.18);
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-4px) rotate(3deg);
      }
    }

    .brand-text strong {
      display: block;
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .brand-text span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-link {
      font-weight: 850;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      background: rgba(184, 154, 255, 0.28);
      display: grid;
      place-items: center;
    }

    .theme-icon {
      width: 21px;
      height: 21px;
      border: 2px solid var(--text);
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }

    .theme-icon::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 50%;
      height: 100%;
      background: var(--text);
    }

    /* HEADER */

    .project-header {
      margin-bottom: 28px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--purple);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 950;
      margin-bottom: 14px;
    }

    body.dark .kicker {
      color: var(--lavender);
    }

    .kicker::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--lavender);
    }

    .project-header h1 {
      font-size: clamp(3rem, 7vw, 6.5rem);
      line-height: 0.88;
      letter-spacing: -0.09em;
      max-width: 900px;
      margin-bottom: 18px;
    }

    .header-lines {
      max-width: 780px;
      display: grid;
      gap: 6px;
    }

    .header-lines p {
      color: var(--muted);
      font-weight: 650;
      line-height: 1.55;
    }

    /* SIMPLE SHOWCASE PAPER */

    .project-paper {
      border: 2px solid var(--line);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: clamp(24px, 4vw, 46px);
      position: relative;
      overflow: hidden;
    }

    .showcase-list {
      position: relative;
      display: grid;
      gap: 52px;
    }

    .showcase-list::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: rgba(23, 18, 15, 0.28);
      transform: translateX(-50%);
    }

    body.dark .showcase-list::before {
      background: rgba(255, 248, 233, 0.26);
    }

    .showcase-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 46px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .showcase-row.reverse .screen-box {
      order: 2;
    }

    .showcase-row.reverse .text-box {
      order: 1;
      text-align: right;
    }

    .screen-box {
      display: flex;
      justify-content: center;
    }

    .screen-frame {
      width: min(100%, 410px);
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: linear-gradient(135deg, var(--purple), var(--wine));
    }

    .screen-frame img {
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 12px;
      background: var(--cream);
      border: 1px solid rgba(23, 18, 15, 0.35);
    }

    .empty-image {
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      border: 2px dashed rgba(255, 248, 233, 0.42);
      color: var(--cream);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      font-weight: 900;
    }

    .text-box {
      max-width: 420px;
    }

    .text-box h2 {
      font-size: clamp(1.8rem, 3vw, 3.2rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
      margin-bottom: 12px;
    }

    .text-box p {
      color: var(--muted);
      line-height: 1.6;
      font-weight: 650;
    }

    .mini-tags {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .showcase-row.reverse .mini-tags {
      justify-content: flex-end;
    }

    .mini-tags span {
      border: 1px solid rgba(76, 51, 118, 0.28);
      background: rgba(184, 154, 255, 0.16);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 850;
      color: var(--purple);
    }

    body.dark .mini-tags span {
      color: var(--cream);
      border-color: rgba(255, 248, 233, 0.18);
      background: rgba(255, 248, 233, 0.08);
    }

    .footer {
      padding: 34px 0;
      color: var(--muted);
      font-weight: 650;
    }

    @media (max-width: 780px) {
      .showcase-list::before {
        display: none;
      }

      .showcase-row,
      .showcase-row.reverse {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .showcase-row.reverse .screen-box,
      .showcase-row.reverse .text-box {
        order: unset;
      }

      .showcase-row.reverse .text-box,
      .text-box {
        text-align: left;
        max-width: 100%;
      }

      .showcase-row.reverse .mini-tags {
        justify-content: flex-start;
      }
    }

    @media (max-width: 620px) {
      .container {
        width: min(100% - 22px, 1120px);
      }

      .nav-wrap {
        padding: 16px 0 26px;
      }

      .back-link {
        display: none;
      }

      .project-header h1 {
        font-size: clamp(3rem, 16vw, 5.2rem);
      }

      .project-paper {
        padding: 18px;
      }
    }
  </style>
<link rel="stylesheet" href="css/global-nav.css" />
<link rel="stylesheet" href="css/feature-project.css" />
</head>

<body>
  <header class="nav-wrap">
    <nav class="nav container">
      <a href="featured-project.html" class="brand">
        <div class="logo-space">
          <img src="assets/icon/brand-logo.png" alt="" decoding="async" />
        </div>

        <div class="brand-text">
          <strong>Abid Hasan</strong>
          <span>Project Showcase</span>
        </div>
      </a>

      <div class="nav-actions">
        <a href="featured-project.html" class="back-link">Back to Projects</a>

        <button class="theme-toggle" id="themeToggle" aria-label="Change theme" aria-pressed="false">
          <span class="theme-icon"></span>
        </button>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="project-header">
      <div class="kicker" id="projectCategory">Automation Project</div>

      <h1 id="projectTitle">Smart lead automation.</h1>

      <div class="header-lines" id="headerText"></div>
    </section>

    <section class="project-paper">
      <div class="showcase-list" id="showcaseList"></div>
    </section>

    <footer class="footer">
      Project showcase page for Abid Hasan portfolio.
    </footer>
  </main>

  <script>
    /*
      EDIT ONLY THIS PART FOR EACH PROJECT.

      You can:
      - Add more header text lines
      - Remove header text lines
      - Add 1, 2, 3, 6, or more showcase rows
      - Leave image empty to show placeholder
      - Add image path when ready
    */

    const projectData = {
      category: "Automation Project",

      title: "Smart lead automation.",

      headerText: [
        "This project shows a simple automation system for handling repeated client work.",
        "The goal is to collect requests, check useful details, and send the correct next step.",
        "It helps reduce manual replies and makes the service process feel more professional.",
        "Each section below can contain one screenshot and one short explanation.",
        "You can reuse this same file for any project by changing only this projectData area."
      ],

      sections: [
        {
          title: "Main project screen",
          text: "This screenshot shows the main visual direction of the project. Use this area to explain what the visitor is seeing and why this part matters.",
          image: "",
          alt: "Main project screenshot",
          tags: ["Main Screen", "UI", "Overview"]
        },
        {
          title: "Workflow logic",
          text: "This section explains how the automation works behind the design. You can show trigger, condition, action, routing, or any system logic here.",
          image: "",
          alt: "Workflow logic screenshot",
          tags: ["Workflow", "Logic", "Automation"]
        },
        {
          title: "Final result",
          text: "This screenshot can show the final output, dashboard, client response, form result, or completed automation state.",
          image: "",
          alt: "Final result screenshot",
          tags: ["Result", "Output", "Case Study"]
        }

        /*
        Add more like this:

        {
          title: "Another screenshot title",
          text: "Write project details here.",
          image: "assets/images/automation_detail_page_images_all_6/01_automation_hero_featured_16x9.png",
          alt: "Image description",
          tags: ["Tag 1", "Tag 2"]
        }
        */
      ]
    };

    const projectCategory = document.getElementById("projectCategory");
    const projectTitle = document.getElementById("projectTitle");
    const headerText = document.getElementById("headerText");
    const showcaseList = document.getElementById("showcaseList");

    projectCategory.textContent = projectData.category;
    projectTitle.textContent = projectData.title;

    headerText.innerHTML = projectData.headerText
      .map(line => `<p>${line}</p>`)
      .join("");

    showcaseList.innerHTML = projectData.sections
      .map((section, index) => {
        const isReverse = index % 2 === 1 ? "reverse" : "";

        const imageHTML = section.image
          ? `<img src="${section.image}" alt="${section.alt || section.title}">`
          : `
            <div class="empty-image">
              <div>
                Add screenshot here<br>
                <small>${section.title}</small>
              </div>
            </div>
          `;

        const tagsHTML = section.tags && section.tags.length
          ? `<div class="mini-tags">${section.tags.map(tag => `<span>${tag}</span>`).join("")}</div>`
          : "";

        return `
          <article class="showcase-row ${isReverse}">
            <div class="screen-box">
              <div class="screen-frame">
                ${imageHTML}
              </div>
            </div>

            <div class="text-box">
              <h2>${section.title}</h2>
              <p>${section.text}</p>
              ${tagsHTML}
            </div>
          </article>
        `;
      })
      .join("");
</script>
<script defer src="js/feature-project.js"></script>
<script defer src="js/project-global.js"></script>
</body>
</html>
