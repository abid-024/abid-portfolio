<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Project | Abid Hasan</title>

    <style>
      :root {
        --bg: #111018;
        --paper: #191722;
        --text: #fff7e8;
        --muted: rgba(255, 247, 232, 0.68);
        --line: #fff7e8;

        --black: #08070c;
        --violet: #7c5cff;
        --purple: #2b1f4f;
        --cyan: #5ef0ff;
        --green: #8dffb1;
        --red: #ff5d73;
        --cream: #fff7e8;

        --shadow: 0 22px 70px rgba(0, 0, 0, 0.46);
      }

      body.light {
        --bg: #eee7dc;
        --paper: #f8f1e6;
        --text: #100f16;
        --muted: #6f6760;
        --line: #100f16;
        --shadow: 0 22px 60px rgba(16, 15, 22, 0.15);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at 18% 18%,
            rgba(124, 92, 255, 0.22),
            transparent 28%
          ),
          radial-gradient(
            circle at 84% 20%,
            rgba(94, 240, 255, 0.11),
            transparent 26%
          ),
          radial-gradient(
            circle at 70% 90%,
            rgba(255, 93, 115, 0.1),
            transparent 26%
          ),
          linear-gradient(rgba(255, 247, 232, 0.035) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 247, 232, 0.035) 1px,
            transparent 1px
          ),
          var(--bg);
        background-size:
          auto,
          auto,
          auto,
          44px 44px,
          44px 44px,
          auto;
        color: var(--text);
        transition: 0.3s ease;
      }

      body.light {
        background:
          radial-gradient(
            circle at 18% 18%,
            rgba(124, 92, 255, 0.14),
            transparent 28%
          ),
          radial-gradient(
            circle at 84% 20%,
            rgba(94, 240, 255, 0.12),
            transparent 26%
          ),
          linear-gradient(rgba(16, 15, 22, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(16, 15, 22, 0.045) 1px, transparent 1px),
          var(--bg);
        background-size:
          auto,
          auto,
          44px 44px,
          44px 44px,
          auto;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      img {
        width: 100%;
        display: block;
      }

      .container {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
      }

      .nav-wrap {
        padding: 24px 0 36px;
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(18px);
      }

      .nav {
        min-height: 64px;
        border: 2px solid var(--line);
        border-radius: 14px;
        background: rgba(25, 23, 34, 0.84);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        box-shadow: var(--shadow);
      }

      body.light .nav {
        background: rgba(248, 241, 230, 0.86);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-space {
        width: 42px;
        height: 42px;
        border: 2px solid rgba(255, 247, 232, 0.28);
        border-radius: 14px;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: rgba(255, 247, 232, 0.08);
        font-weight: 950;
        box-shadow: 0 10px 24px rgba(15, 18, 20, 0.12);
        animation: logoFloat 4.8s ease-in-out infinite;
        transition:
          transform 0.28s ease,
          box-shadow 0.28s ease;
      }

      body.light .logo-space {
        border-color: rgba(16, 15, 22, 0.24);
        background: rgba(255, 247, 232, 0.5);
      }

      .logo-space img {
        height: 100%;
        object-fit: contain;
        padding: 6px;
      }

      .brand:hover .logo-space {
        transform: translateY(-2px) rotate(-4deg);
        box-shadow: 0 14px 28px rgba(15, 18, 20, 0.18);
      }

      @keyframes logoFloat {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }

        50% {
          transform: translateY(-4px) rotate(3deg);
        }
      }

      .brand-text strong {
        display: block;
        font-weight: 950;
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .brand-text span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .back-link {
        font-weight: 850;
      }

      .theme-toggle {
        width: 44px;
        height: 44px;
        border: 0;
        border-radius: 50%;
        cursor: pointer;
        background: linear-gradient(
          135deg,
          rgba(124, 92, 255, 0.32),
          rgba(94, 240, 255, 0.22)
        );
        display: grid;
        place-items: center;
      }

      .theme-icon {
        width: 21px;
        height: 21px;
        border: 2px solid var(--text);
        border-radius: 50%;
        position: relative;
        overflow: hidden;
      }

      .theme-icon::after {
        content: "";
        position: absolute;
        right: 0;
        top: 0;
        width: 50%;
        height: 100%;
        background: var(--text);
      }

      .project-header {
        margin-bottom: 28px;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--cyan);
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 950;
        margin-bottom: 14px;
      }

      body.light .kicker {
        color: var(--violet);
      }

      .kicker::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--green);
        box-shadow:
          0 0 0 6px rgba(141, 255, 177, 0.14),
          0 0 24px rgba(141, 255, 177, 0.55);
      }

      .project-header h1 {
        font-size: clamp(3rem, 7vw, 6.5rem);
        line-height: 0.88;
        letter-spacing: -0.09em;
        max-width: 940px;
        margin-bottom: 18px;
      }

      .secret-word {
        background: linear-gradient(
          90deg,
          var(--violet),
          var(--cyan),
          var(--green)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .header-lines {
        max-width: 790px;
        display: grid;
        gap: 6px;
      }

      .header-lines p {
        color: var(--muted);
        font-weight: 650;
        line-height: 1.55;
      }

      .project-paper {
        border: 2px solid var(--line);
        border-radius: 28px;
        background: var(--paper);
        box-shadow: var(--shadow);
        padding: clamp(24px, 4vw, 46px);
        position: relative;
        overflow: hidden;
      }

      .project-paper::before {
        content: "CLASSIFIED";
        position: absolute;
        right: -20px;
        top: 22px;
        transform: rotate(10deg);
        font-size: clamp(2.8rem, 7vw, 7rem);
        font-weight: 950;
        letter-spacing: -0.08em;
        color: rgba(124, 92, 255, 0.07);
        pointer-events: none;
      }

      .showcase-list {
        position: relative;
        display: grid;
        gap: 52px;
      }

      .showcase-list::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2px;
        background: rgba(255, 247, 232, 0.22);
        transform: translateX(-50%);
      }

      body.light .showcase-list::before {
        background: rgba(16, 15, 22, 0.24);
      }

      .showcase-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 46px;
        align-items: center;
        position: relative;
        z-index: 1;
      }

      .showcase-row.reverse .screen-box {
        order: 2;
      }

      .showcase-row.reverse .text-box {
        order: 1;
        text-align: right;
        margin-left: auto;
      }

      .screen-box {
        display: flex;
        justify-content: center;
      }

      .screen-frame {
        width: min(100%, 430px);
        border: 2px solid var(--line);
        border-radius: 20px;
        padding: 12px;
        background:
          linear-gradient(rgba(255, 247, 232, 0.06) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 247, 232, 0.06) 1px,
            transparent 1px
          ),
          radial-gradient(
            circle at 20% 16%,
            rgba(124, 92, 255, 0.38),
            transparent 32%
          ),
          radial-gradient(
            circle at 84% 78%,
            rgba(94, 240, 255, 0.2),
            transparent 30%
          ),
          linear-gradient(135deg, var(--black), var(--purple));
        background-size:
          26px 26px,
          26px 26px,
          auto,
          auto,
          auto;
      }

      .screen-frame img {
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border-radius: 14px;
        background: var(--cream);
        border: 1px solid rgba(16, 15, 22, 0.35);
      }

      .empty-image {
        aspect-ratio: 4 / 3;
        border-radius: 14px;
        border: 2px dashed rgba(255, 247, 232, 0.38);
        color: var(--cream);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 20px;
        font-weight: 900;
        position: relative;
        overflow: hidden;
      }

      .empty-image::before {
        content: "";
        position: absolute;
        width: 160%;
        height: 2px;
        background: rgba(94, 240, 255, 0.32);
        top: 45%;
        left: -30%;
        transform: rotate(-14deg);
      }

      .empty-image small {
        display: block;
        margin-top: 6px;
        color: rgba(255, 247, 232, 0.72);
        font-size: 0.78rem;
      }

      .text-box {
        max-width: 420px;
      }

      .text-box h2 {
        font-size: clamp(1.8rem, 3vw, 3.2rem);
        line-height: 0.95;
        letter-spacing: -0.07em;
        margin-bottom: 12px;
      }

      .text-box p {
        color: var(--muted);
        line-height: 1.6;
        font-weight: 650;
      }

      .mini-tags {
        margin-top: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .showcase-row.reverse .mini-tags {
        justify-content: flex-end;
      }

      .mini-tags span {
        border: 1px solid rgba(124, 92, 255, 0.34);
        background: rgba(124, 92, 255, 0.14);
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 0.78rem;
        font-weight: 850;
        color: var(--cyan);
      }

      .mini-tags span:nth-child(2n) {
        border-color: rgba(94, 240, 255, 0.32);
        background: rgba(94, 240, 255, 0.1);
        color: var(--green);
      }

      .mini-tags span:nth-child(3n) {
        border-color: rgba(255, 93, 115, 0.32);
        background: rgba(255, 93, 115, 0.1);
        color: var(--red);
      }

      body.light .mini-tags span {
        color: var(--purple);
        border-color: rgba(124, 92, 255, 0.25);
        background: rgba(124, 92, 255, 0.1);
      }

      .footer {
        padding: 34px 0;
        color: var(--muted);
        font-weight: 650;
      }

      @media (max-width: 780px) {
        .showcase-list::before {
          display: none;
        }

        .showcase-row,
        .showcase-row.reverse {
          grid-template-columns: 1fr;
          gap: 18px;
        }

        .showcase-row.reverse .screen-box,
        .showcase-row.reverse .text-box {
          order: unset;
        }

        .showcase-row.reverse .text-box,
        .text-box {
          text-align: left;
          max-width: 100%;
          margin-left: 0;
        }

        .showcase-row.reverse .mini-tags {
          justify-content: flex-start;
        }
      }

      @media (max-width: 620px) {
        .container {
          width: min(100% - 22px, 1120px);
        }

        .nav-wrap {
          padding: 16px 0 26px;
        }

        .back-link {
          display: none;
        }

        .project-header h1 {
          font-size: clamp(3rem, 16vw, 5.2rem);
        }

        .project-paper {
          padding: 18px;
        }
      }
    </style>
    <link rel="stylesheet" href="../css/global-nav.css" />
    <link rel="stylesheet" href="../css/feature-project.css" />
  </head>

  <body>
    <header class="nav-wrap">
      <nav class="nav container">
        <a href="../featured-project.html" class="brand">
          <div class="logo-space">
            <img src="../assets/icon/brand-logo.png" alt="" decoding="async" />
          </div>

          <div class="brand-text">
            <strong>Abid Hasan</strong>
            <span>Secret Project</span>
          </div>
        </a>

        <div class="nav-actions">
          <a href="../featured-project.html" class="back-link"
            >Back to Projects</a
          >

          <button
            class="theme-toggle"
            id="themeToggle"
            aria-label="Change theme"
            aria-pressed="false"
          >
            <span class="theme-icon"></span>
          </button>
        </div>
      </nav>
    </header>

    <main class="container">
      <section class="project-header">
        <div class="kicker" id="projectCategory">Secret Project</div>

        <h1 id="projectTitle">
          Hidden lab for <span class="secret-word">surprise ideas.</span>
        </h1>

        <div class="header-lines" id="headerText"></div>
      </section>

      <section class="project-paper">
        <div class="showcase-list" id="showcaseList"></div>
      </section>

      <footer class="footer">
        Secret project showcase page for Abid Hasan portfolio.
      </footer>
    </main>

    <script>
      const projectData = {
        category: "Secret Project",

        headerText: [
          "This page is the secret featured project slot: a place for hidden, playful, or experimental work.",
          "It keeps the mystery style, but the content now reads like a real project page instead of a placeholder template.",
          "Use it for surprise pages, locked concepts, mini interactions, private tools, or anything that should feel discovered.",
          "Each section can show one reveal point, from the entry screen to the final unlocked state.",
        ],

        sections: [
          {
            title: "Locked entry screen",
            text: "This is the first moment of the secret project: the screen that makes the user feel like they found something hidden.",
            image: "",
            alt: "Secret project entry screen screenshot",
            tags: ["Locked", "Entry", "Mystery"],
          },
          {
            title: "Secret interaction",
            text: "This section explains the main hidden behavior, choice, animation, unlock action, or playful interaction inside the project.",
            image: "",
            alt: "Secret project interaction screenshot",
            tags: ["Interaction", "Unlock", "Experiment"],
          },
          {
            title: "Mystery atmosphere",
            text: "Use this part to show the mood: dark surface, glow, signals, cards, symbols, or visual details that make the page feel discovered.",
            image: "",
            alt: "Secret project visual atmosphere screenshot",
            tags: ["Mood", "Glow", "Style"],
          },
          {
            title: "Final reveal",
            text: "The final section shows the reward: the revealed screen, hidden result, private tool state, or completed experimental idea.",
            image: "",
            alt: "Secret project final reveal screenshot",
            tags: ["Reveal", "Final", "Unlocked"],
          },
        ],
      };

      const projectCategory = document.getElementById("projectCategory");
      const headerText = document.getElementById("headerText");
      const showcaseList = document.getElementById("showcaseList");

      projectCategory.textContent = projectData.category;

      headerText.innerHTML = projectData.headerText
        .map((line) => `<p>${line}</p>`)
        .join("");

      showcaseList.innerHTML = projectData.sections
        .map((section, index) => {
          const isReverse = index % 2 === 1 ? "reverse" : "";

          const imageHTML = section.image
            ? `<img src="${section.image}" alt="${section.alt || section.title}">`
            : `
            <div class="empty-image">
              <div>
                Add screenshot here
                <small>${section.title}</small>
              </div>
            </div>
          `;

          const tagsHTML =
            section.tags && section.tags.length
              ? `<div class="mini-tags">${section.tags.map((tag) => `<span>${tag}</span>`).join("")}</div>`
              : "";

          return `
          <article class="showcase-row ${isReverse}">
            <div class="screen-box">
              <div class="screen-frame">
                ${imageHTML}
              </div>
            </div>

            <div class="text-box">
              <h2>${section.title}</h2>
              <p>${section.text}</p>
              ${tagsHTML}
            </div>
          </article>
        `;
        })
        .join("");
    </script>
    <script defer src="../js/feature-project.js"></script>
    <script defer src="../js/project-global.js"></script>
  </body>
</html>
