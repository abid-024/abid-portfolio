<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Showcase | Abid Hasan</title>

  <style>
    :root {
      --bg: #ede4d4;
      --paper: #f7efe1;
      --text: #111111;
      --muted: #70685f;
      --line: #111111;

      --dark: #151515;
      --charcoal: #252525;
      --gold: #f2b35a;
      --teal: #54d2c4;
      --coral: #f27a5a;
      --cream: #fff5e3;

      --shadow: 0 22px 60px rgba(17, 17, 17, 0.15);
    }

    body.dark {
      --bg: #111111;
      --paper: #1b1b1b;
      --text: #fff5e3;
      --muted: rgba(255, 245, 227, 0.66);
      --line: #fff5e3;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 84% 16%, rgba(242, 179, 90, 0.16), transparent 28%),
        radial-gradient(circle at 12% 88%, rgba(84, 210, 196, 0.13), transparent 28%),
        linear-gradient(rgba(17, 17, 17, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 17, 17, 0.045) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 44px 44px, 44px 44px, auto;
      color: var(--text);
      transition: 0.3s ease;
    }

    body.dark {
      background:
        radial-gradient(circle at 84% 16%, rgba(242, 179, 90, 0.13), transparent 30%),
        radial-gradient(circle at 12% 88%, rgba(84, 210, 196, 0.11), transparent 30%),
        linear-gradient(rgba(255, 245, 227, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 245, 227, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 44px 44px, 44px 44px, auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      width: 100%;
      display: block;
    }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav-wrap {
      padding: 24px 0 36px;
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
    }

    .nav {
      min-height: 64px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: rgba(247, 239, 225, 0.86);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      box-shadow: 0 18px 45px rgba(17, 17, 17, 0.08);
    }

    body.dark .nav {
      background: rgba(27, 27, 27, 0.86);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-space {
      width: 42px;
      height: 42px;
      border: 2px solid rgba(17, 17, 17, 0.24);
      border-radius: 14px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: rgba(255, 245, 227, 0.5);
      font-weight: 950;
      box-shadow: 0 10px 24px rgba(15, 18, 20, 0.12);
      animation: logoFloat 4.8s ease-in-out infinite;
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    body.dark .logo-space {
      border-color: rgba(255, 245, 227, 0.26);
      background: rgba(255, 245, 227, 0.06);
    }

    .logo-space img {
      height: 100%;
      object-fit: contain;
      padding: 6px;
    }

    .brand:hover .logo-space {
      transform: translateY(-2px) rotate(-4deg);
      box-shadow: 0 14px 28px rgba(15, 18, 20, 0.18);
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-4px) rotate(3deg);
      }
    }

    .brand-text strong {
      display: block;
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .brand-text span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-link {
      font-weight: 850;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(242, 179, 90, 0.28), rgba(84, 210, 196, 0.22));
      display: grid;
      place-items: center;
    }

    .theme-icon {
      width: 21px;
      height: 21px;
      border: 2px solid var(--text);
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }

    .theme-icon::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 50%;
      height: 100%;
      background: var(--text);
    }

    .project-header {
      margin-bottom: 28px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 950;
      margin-bottom: 14px;
    }

    .kicker::before {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 6px rgba(242, 179, 90, 0.18);
    }

    .project-header h1 {
      font-size: clamp(3rem, 7vw, 6.5rem);
      line-height: 0.88;
      letter-spacing: -0.09em;
      max-width: 940px;
      margin-bottom: 18px;
    }

    .accent-word {
      background: linear-gradient(90deg, var(--gold), var(--teal), var(--coral));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-lines {
      max-width: 790px;
      display: grid;
      gap: 6px;
    }

    .header-lines p {
      color: var(--muted);
      font-weight: 650;
      line-height: 1.55;
    }

    .project-paper {
      border: 2px solid var(--line);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: clamp(24px, 4vw, 46px);
      position: relative;
      overflow: hidden;
    }

    .showcase-list {
      position: relative;
      display: grid;
      gap: 52px;
    }

    .showcase-list::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: rgba(17, 17, 17, 0.26);
      transform: translateX(-50%);
    }

    body.dark .showcase-list::before {
      background: rgba(255, 245, 227, 0.24);
    }

    .showcase-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 46px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .showcase-row.reverse .screen-box {
      order: 2;
    }

    .showcase-row.reverse .text-box {
      order: 1;
      text-align: right;
      margin-left: auto;
    }

    .screen-box {
      display: flex;
      justify-content: center;
    }

    .screen-frame {
      width: min(100%, 430px);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 12px;
      background:
        radial-gradient(circle at 15% 15%, rgba(242, 179, 90, 0.26), transparent 32%),
        radial-gradient(circle at 82% 78%, rgba(84, 210, 196, 0.22), transparent 30%),
        linear-gradient(135deg, var(--dark), var(--charcoal));
    }

    .screen-frame img {
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 14px;
      background: var(--cream);
      border: 1px solid rgba(17, 17, 17, 0.35);
    }

    .empty-image {
      aspect-ratio: 4 / 3;
      border-radius: 14px;
      border: 2px dashed rgba(255, 245, 227, 0.44);
      color: var(--cream);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      font-weight: 900;
    }

    .empty-image small {
      display: block;
      margin-top: 6px;
      color: rgba(255, 245, 227, 0.72);
      font-size: 0.78rem;
    }

    .text-box {
      max-width: 420px;
    }

    .text-box h2 {
      font-size: clamp(1.8rem, 3vw, 3.2rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
      margin-bottom: 12px;
    }

    .text-box p {
      color: var(--muted);
      line-height: 1.6;
      font-weight: 650;
    }

    .mini-tags {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .showcase-row.reverse .mini-tags {
      justify-content: flex-end;
    }

    .mini-tags span {
      border: 1px solid rgba(17, 17, 17, 0.18);
      background: rgba(242, 179, 90, 0.16);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 850;
      color: var(--dark);
    }

    .mini-tags span:nth-child(2n) {
      background: rgba(84, 210, 196, 0.15);
    }

    .mini-tags span:nth-child(3n) {
      background: rgba(242, 122, 90, 0.14);
    }

    body.dark .mini-tags span {
      color: var(--cream);
      border-color: rgba(255, 245, 227, 0.18);
      background: rgba(255, 245, 227, 0.08);
    }

    .footer {
      padding: 34px 0;
      color: var(--muted);
      font-weight: 650;
    }

    @media (max-width: 780px) {
      .showcase-list::before {
        display: none;
      }

      .showcase-row,
      .showcase-row.reverse {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .showcase-row.reverse .screen-box,
      .showcase-row.reverse .text-box {
        order: unset;
      }

      .showcase-row.reverse .text-box,
      .text-box {
        text-align: left;
        max-width: 100%;
        margin-left: 0;
      }

      .showcase-row.reverse .mini-tags {
        justify-content: flex-start;
      }
    }

    @media (max-width: 620px) {
      .container {
        width: min(100% - 22px, 1120px);
      }

      .nav-wrap {
        padding: 16px 0 26px;
      }

      .back-link {
        display: none;
      }

      .project-header h1 {
        font-size: clamp(3rem, 16vw, 5.2rem);
      }

      .project-paper {
        padding: 18px;
      }
    }
  </style>
<link rel="stylesheet" href="css/global-nav.css" />
<link rel="stylesheet" href="css/feature-project.css" />
</head>

<body>
  <header class="nav-wrap">
    <nav class="nav container">
      <a href="featured-project.html" class="brand">
        <div class="logo-space">
          <img src="assets/icon/brand-logo.png" alt="" decoding="async" />
        </div>

        <div class="brand-text">
          <strong>Abid Hasan</strong>
          <span>Project Showcase</span>
        </div>
      </a>

      <div class="nav-actions">
        <a href="featured-project.html" class="back-link">Back to Projects</a>

        <button class="theme-toggle" id="themeToggle" aria-label="Change theme" aria-pressed="false">
          <span class="theme-icon"></span>
        </button>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="project-header">
      <div class="kicker" id="projectCategory">Other Project</div>

      <h1 id="projectTitle">
        Creative builds <span class="accent-word">outside the usual boxes.</span>
      </h1>

      <div class="header-lines" id="headerText"></div>
    </section>

    <section class="project-paper">
      <div class="showcase-list" id="showcaseList"></div>
    </section>

    <footer class="footer">
      Other project showcase page for Abid Hasan portfolio.
    </footer>
  </main>

  <script>
    /*
      EDIT ONLY THIS PART FOR EACH GENERAL PROJECT.

      Add image path like:
      image: "assets/images/code_feeling_detail_page_images_all_6/01_code_feeling_hero_featured_16x9.png"

      Add more sections by copying one object inside sections: []
    */

    const projectData = {
      category: "Other Project",

      headerText: [
        "This page is for the extra featured work that does not fit one single service category.",
        "It can hold small tools, creative experiments, mixed design ideas, quick builds, and unusual portfolio concepts.",
        "The style stays close to the main project vault: calm cream surface, bold type, clean screenshots, and useful detail blocks.",
        "Use these sections to show what the project does, why it exists, and what made it different from the regular service pages."
      ],

      sections: [
        {
          title: "Mixed project preview",
          text: "The main preview shows the strongest part of the project, whether it is a mini site, a content idea, a tool screen, or a visual concept.",
          image: "",
          alt: "Main project preview screenshot",
          tags: ["Other", "Preview", "Creative"]
        },
        {
          title: "Creative direction",
          text: "This section explains the layout, color, content structure, or interaction idea that gives the project its own personality.",
          image: "",
          alt: "Project design details screenshot",
          tags: ["Direction", "Design", "Details"]
        },
        {
          title: "How it works",
          text: "Show the project flow here: how someone moves through it, what action happens, or what small system sits behind the screen.",
          image: "",
          alt: "Project system or flow screenshot",
          tags: ["Flow", "Structure", "Idea"]
        },
        {
          title: "Final polish",
          text: "The final section can show the finished state, a polished screen, the last interaction, or the clearest proof of the project.",
          image: "",
          alt: "Final project result screenshot",
          tags: ["Final", "Polish", "Portfolio"]
        }
      ]
    };

    const projectCategory = document.getElementById("projectCategory");
    const headerText = document.getElementById("headerText");
    const showcaseList = document.getElementById("showcaseList");

    projectCategory.textContent = projectData.category;

    headerText.innerHTML = projectData.headerText
      .map(line => `<p>${line}</p>`)
      .join("");

    showcaseList.innerHTML = projectData.sections
      .map((section, index) => {
        const isReverse = index % 2 === 1 ? "reverse" : "";

        const imageHTML = section.image
          ? `<img src="${section.image}" alt="${section.alt || section.title}">`
          : `
            <div class="empty-image">
              <div>
                Add screenshot here
                <small>${section.title}</small>
              </div>
            </div>
          `;

        const tagsHTML = section.tags && section.tags.length
          ? `<div class="mini-tags">${section.tags.map(tag => `<span>${tag}</span>`).join("")}</div>`
          : "";

        return `
          <article class="showcase-row ${isReverse}">
            <div class="screen-box">
              <div class="screen-frame">
                ${imageHTML}
              </div>
            </div>

            <div class="text-box">
              <h2>${section.title}</h2>
              <p>${section.text}</p>
              ${tagsHTML}
            </div>
          </article>
        `;
      })
      .join("");
</script>
<script defer src="js/feature-project.js"></script>
<script defer src="js/project-global.js"></script>
</body>
</html>
